name: Weekly Oil Price Prediction

on:
  schedule:
    - cron: '0 0 * * 6'
  workflow_dispatch:

jobs:
  run-prediction:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # 🔥 1. 將 Python 升級到 3.12，滿足 pandas-ta 的要求

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade yfinance requests
          # 🔥 2. 加入 "pandas<3.0"，強制使用穩定的 2.x 版本，避免套件衝突
          pip install "pandas<3.0" numpy xgboost statsmodels feedparser matplotlib scikit-learn shap pandas-ta openpyxl

      - name: Run prediction script
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python 即時預測.py

      - name: Clean up system cache
        run: |
          # 刪除 Python 產生的系統暫存檔，保持專案乾淨，避免存檔衝突
          find . -type d -name "__pycache__" -exec rm -rf {} +

      - name: Commit and push updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update: Weekly oil price DB and reports"
          branch: main
